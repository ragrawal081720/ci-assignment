{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ci-assignment.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secret.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
{{- end }}
{{ if .Values.config.create }}
{{- $existingCfg := lookup "v1" "ConfigMap" .Values.namespace.name .Values.config.name }}
{{- $frontendOrigin := .Values.config.data.FRONTEND_ORIGIN }}
{{- $viteApiBaseURL := .Values.config.data.VITE_API_BASE_URL }}
{{- if and $existingCfg $existingCfg.data (hasKey $existingCfg.data "FRONTEND_ORIGIN") }}
{{- $frontendOrigin = index $existingCfg.data "FRONTEND_ORIGIN" }}
{{- end }}
{{- if and $existingCfg $existingCfg.data (hasKey $existingCfg.data "VITE_API_BASE_URL") }}
{{- $viteApiBaseURL = index $existingCfg.data "VITE_API_BASE_URL" }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.config.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "ci-assignment.labels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.config.data }}
  {{- if and (ne $k "FRONTEND_ORIGIN") (ne $k "VITE_API_BASE_URL") }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
  FRONTEND_ORIGIN: {{ $frontendOrigin | quote }}
  VITE_API_BASE_URL: {{ $viteApiBaseURL | quote }}
{{ end }}
