{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.deploymentName }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: backend
    {{- include "ci-assignment.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image }}
          env:
            - name: DB_HOST
              value: {{ .Values.postgres.serviceName }}
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.config.name }}
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: DB_USER
          command:
            - sh
            - -c
            - until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME"; do sleep 2; done
        - name: wait-for-redis
          image: {{ .Values.redis.image }}
          env:
            - name: REDIS_HOST
              value: {{ .Values.redis.serviceName }}
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.config.name }}
                  key: REDIS_PORT
          command:
            - sh
            - -c
            - until redis-cli -h "$REDIS_HOST" -p "$REDIS_PORT" ping; do sleep 2; done
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env:
            - name: DB_HOST
              value: {{ .Values.postgres.serviceName }}
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.config.name }}
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: DB_PASSWORD
            - name: REDIS_HOST
              value: {{ .Values.redis.serviceName }}
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.config.name }}
                  key: REDIS_PORT
            - name: REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.config.name }}
                  key: REDIS_DB
            - name: CACHE_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.config.name }}
                  key: CACHE_TTL_SECONDS
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.config.name }}
                  key: FRONTEND_ORIGIN
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.healthPath }}
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.healthPath }}
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.serviceName }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: backend
    {{- include "ci-assignment.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
{{- end }}
