name: Terraform End-to-End

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Terraform action"
        required: true
        type: choice
        options:
          - plan
          - apply
        default: plan

concurrency:
  group: terraform-ci-assignment-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  provision-infra:
    name: Terraform ${{ inputs.terraform_action }}
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (access keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ./terraform/eks
        shell: bash
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: ./terraform/eks
        shell: bash
        run: terraform validate

      - name: Terraform plan
        working-directory: ./terraform/eks
        shell: bash
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: inputs.terraform_action == 'apply'
        working-directory: ./terraform/eks
        shell: bash
        run: terraform apply -input=false -auto-approve tfplan

      - name: Export Terraform outputs
        if: inputs.terraform_action == 'apply'
        id: tf_outputs
        working-directory: ./terraform/eks
        shell: bash
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"

    outputs:
      cluster_name: ${{ steps.tf_outputs.outputs.cluster_name }}

  publish:
    name: Publish ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    needs: provision-infra
    if: github.ref == 'refs/heads/main' && inputs.terraform_action == 'apply'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: books-backend
            context: ./backend
            file: ./backend/Dockerfile
          - image_name: books-frontend
            context: ./frontend
            file: ./frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy To Kubernetes
    runs-on: ubuntu-latest
    needs:
      - provision-infra
      - publish
    if: github.ref == 'refs/heads/main' && inputs.terraform_action == 'apply'
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (access keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig from Terraform cluster
        shell: bash
        run: |
          CLUSTER_NAME='${{ needs.provision-infra.outputs.cluster_name }}'
          if [[ -z "$CLUSTER_NAME" ]]; then
            echo "Terraform output cluster_name is empty." >&2
            exit 1
          fi
          aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "${{ secrets.AWS_REGION }}"
          kubectl config current-context

      - name: Roll out SHA-tagged images declaratively
        shell: bash
        run: |
          NS="ci-assignment"
          SHORT_SHA="${GITHUB_SHA::7}"
          ./scripts/rollout-sha-images.sh "$DOCKERHUB_USER" "$NS" "$SHORT_SHA"

      - name: Wait for LoadBalancer endpoints
        shell: bash
        run: |
          NS="ci-assignment"
          DEADLINE=$((SECONDS + 900))

          while true; do
            BACKEND_DNS="$(kubectl get svc backend -n "$NS" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            FRONTEND_DNS="$(kubectl get svc frontend -n "$NS" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"

            if [[ -z "$BACKEND_DNS" ]]; then
              BACKEND_DNS="$(kubectl get svc backend -n "$NS" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
            fi
            if [[ -z "$FRONTEND_DNS" ]]; then
              FRONTEND_DNS="$(kubectl get svc frontend -n "$NS" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
            fi

            if [[ -n "$BACKEND_DNS" && -n "$FRONTEND_DNS" ]]; then
              echo "Backend endpoint: $BACKEND_DNS"
              echo "Frontend endpoint: $FRONTEND_DNS"
              break
            fi

            if (( SECONDS >= DEADLINE )); then
              echo "Timed out waiting for LoadBalancer hostname/IP in namespace '$NS'." >&2
              kubectl get svc -n "$NS"
              exit 1
            fi

            echo "Waiting for LoadBalancer hostname/IP..."
            sleep 10
          done

      - name: Patch runtime URLs and verify endpoints
        shell: bash
        run: |
          NS="ci-assignment"
          ./scripts/patch-lb-urls.sh "$NS"
