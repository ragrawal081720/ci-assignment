name: Helm - Manual Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Helm release name"
        required: true
        default: "ci-assignment"
        type: string
      namespace:
        description: "Kubernetes namespace"
        required: true
        default: "ci-assignment"
        type: string
      create_namespace:
        description: "Let Helm create Namespace resource"
        required: true
        default: false
        type: boolean
      dockerhub_username:
        description: "Docker Hub username/organization"
        required: true
        default: "ragrawal081720"
        type: string
      image_tag:
        description: "Image tag for backend/frontend (e.g. sha-abc1234 or latest)"
        required: true
        default: "latest"
        type: string
      helm_timeout:
        description: "Helm wait timeout"
        required: true
        default: "15m"
        type: string
      lb_url_patching:
        description: "Enable Helm post-upgrade LB URL patch hook"
        required: true
        default: true
        type: boolean
      hook_image:
        description: "Hook image override (leave empty to keep chart default)"
        required: false
        default: ""
        type: string

concurrency:
  group: helm-manual-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy via Helm Chart
    runs-on: ubuntu-latest
    env:
      RELEASE_NAME: ${{ inputs.release_name }}
      NAMESPACE: ${{ inputs.namespace }}
      CREATE_NAMESPACE: ${{ inputs.create_namespace }}
      DOCKERHUB_USER: ${{ inputs.dockerhub_username }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      HELM_TIMEOUT: ${{ inputs.helm_timeout }}
      LB_URL_PATCHING: ${{ inputs.lb_url_patching }}
      HOOK_IMAGE: ${{ inputs.hook_image }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (access keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate AWS auth is available
        shell: bash
        run: |
          aws --version
          aws sts get-caller-identity

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client
          kubectl config current-context
          helm version

      - name: Validate Helm chart
        shell: bash
        run: |
          helm lint helm/ci-assignment
          helm template "$RELEASE_NAME" helm/ci-assignment \
            --namespace "$NAMESPACE" \
            --set namespace.name="$NAMESPACE" \
            --set namespace.create="$CREATE_NAMESPACE" \
            --set backend.image.repository="$DOCKERHUB_USER/books-backend" \
            --set backend.image.tag="$IMAGE_TAG" \
            --set frontend.image.repository="$DOCKERHUB_USER/books-frontend" \
            --set frontend.image.tag="$IMAGE_TAG" \
            --set lbUrlPatching.enabled="$LB_URL_PATCHING" \
            >/dev/null

      - name: Ensure namespace exists when chart namespace creation is disabled
        if: ${{ inputs.create_namespace == false }}
        shell: bash
        run: |
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy release with Helm
        shell: bash
        run: |
          set -euo pipefail

          EXTRA_ARGS=()
          if [[ -n "$HOOK_IMAGE" ]]; then
            EXTRA_ARGS+=(--set "lbUrlPatching.hookImage=$HOOK_IMAGE")
          fi

          helm upgrade --install "$RELEASE_NAME" helm/ci-assignment \
            --namespace "$NAMESPACE" \
            --wait \
            --timeout "$HELM_TIMEOUT" \
            --set "namespace.name=$NAMESPACE" \
            --set "namespace.create=$CREATE_NAMESPACE" \
            --set "backend.image.repository=$DOCKERHUB_USER/books-backend" \
            --set "backend.image.tag=$IMAGE_TAG" \
            --set "frontend.image.repository=$DOCKERHUB_USER/books-frontend" \
            --set "frontend.image.tag=$IMAGE_TAG" \
            --set "lbUrlPatching.enabled=$LB_URL_PATCHING" \
            "${EXTRA_ARGS[@]}"

      - name: Show release and cluster status
        shell: bash
        run: |
          helm list -n "$NAMESPACE"
          kubectl get pods -n "$NAMESPACE" -o wide
          kubectl get svc -n "$NAMESPACE"

      - name: Print app endpoints (if available)
        shell: bash
        run: |
          BACKEND_ENDPOINT="$(kubectl get svc backend -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
          FRONTEND_ENDPOINT="$(kubectl get svc frontend -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"

          if [[ -z "$BACKEND_ENDPOINT" ]]; then
            BACKEND_ENDPOINT="$(kubectl get svc backend -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
          fi
          if [[ -z "$FRONTEND_ENDPOINT" ]]; then
            FRONTEND_ENDPOINT="$(kubectl get svc frontend -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
          fi

          echo "Backend endpoint : ${BACKEND_ENDPOINT:-pending}"
          echo "Frontend endpoint: ${FRONTEND_ENDPOINT:-pending}"
