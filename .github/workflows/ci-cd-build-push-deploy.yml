name: CI/CD - Build, Push, and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "backend/**"
      - "frontend/**"
      - "kube.yaml"
      - "scripts/**"
      - ".github/workflows/ci-cd-build-push-deploy.yml"
  workflow_dispatch:

concurrency:
  group: ci-assignment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: books-backend
            context: ./backend
            file: ./backend/Dockerfile
          - image_name: books-frontend
            context: ./frontend
            file: ./frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy To Kubernetes
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main'
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client
          kubectl config current-context

      - name: Roll out SHA-tagged images declaratively
        shell: bash
        run: |
          NS="ci-assignment"
          SHORT_SHA="${GITHUB_SHA::7}"
          ./scripts/rollout-sha-images.sh "$DOCKERHUB_USER" "$NS" "$SHORT_SHA"

      - name: Wait for LoadBalancer hostnames
        shell: bash
        run: |
          NS="ci-assignment"
          DEADLINE=$((SECONDS + 900))

          while true; do
            BACKEND_DNS="$(kubectl get svc backend -n "$NS" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            FRONTEND_DNS="$(kubectl get svc frontend -n "$NS" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"

            if [[ -n "$BACKEND_DNS" && -n "$FRONTEND_DNS" ]]; then
              echo "Backend DNS: $BACKEND_DNS"
              echo "Frontend DNS: $FRONTEND_DNS"
              break
            fi

            if (( SECONDS >= DEADLINE )); then
              echo "Timed out waiting for LoadBalancer hostnames in namespace '$NS'." >&2
              kubectl get svc -n "$NS"
              exit 1
            fi

            echo "Waiting for LoadBalancer hostnames..."
            sleep 10
          done

      - name: Patch runtime URLs and verify endpoints
        shell: bash
        run: |
          NS="ci-assignment"
          ./scripts/patch-lb-urls.sh "$NS"
