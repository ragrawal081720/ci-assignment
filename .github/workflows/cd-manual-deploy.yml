name: CD - Manual Kubernetes Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: "Kubernetes namespace"
        required: true
        default: "ci-assignment"
        type: string

concurrency:
  group: cd-manual-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy To Kubernetes
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      TARGET_NAMESPACE: ${{ inputs.namespace }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (access keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate AWS auth is available
        shell: bash
        run: |
          aws --version
          aws sts get-caller-identity

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client
          kubectl config current-context

      - name: Roll out SHA-tagged images declaratively
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          SHA_TAG="sha-$SHORT_SHA"

          echo "Validating image tags exist on Docker Hub: $SHA_TAG"
          docker buildx imagetools inspect "$DOCKERHUB_USER/books-backend:$SHA_TAG" >/dev/null
          docker buildx imagetools inspect "$DOCKERHUB_USER/books-frontend:$SHA_TAG" >/dev/null

          echo "Deploying image tag: $SHA_TAG"
          ./scripts/rollout-sha-images.sh "$DOCKERHUB_USER" "$TARGET_NAMESPACE" "$SHORT_SHA"

      - name: Wait for LoadBalancer endpoints
        shell: bash
        run: |
          NS="$TARGET_NAMESPACE"
          DEADLINE=$((SECONDS + 900))

          while true; do
            BACKEND_DNS="$(kubectl get svc backend -n "$NS" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            FRONTEND_DNS="$(kubectl get svc frontend -n "$NS" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"

            if [[ -z "$BACKEND_DNS" ]]; then
              BACKEND_DNS="$(kubectl get svc backend -n "$NS" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
            fi
            if [[ -z "$FRONTEND_DNS" ]]; then
              FRONTEND_DNS="$(kubectl get svc frontend -n "$NS" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)"
            fi

            if [[ -n "$BACKEND_DNS" && -n "$FRONTEND_DNS" ]]; then
              echo "Backend endpoint: $BACKEND_DNS"
              echo "Frontend endpoint: $FRONTEND_DNS"
              break
            fi

            if (( SECONDS >= DEADLINE )); then
              echo "Timed out waiting for LoadBalancer hostname/IP in namespace '$NS'." >&2
              kubectl get svc -n "$NS"
              exit 1
            fi

            echo "Waiting for LoadBalancer hostname/IP..."
            sleep 10
          done

      - name: Patch runtime URLs and verify endpoints
        shell: bash
        run: |
          ./scripts/patch-lb-urls.sh "$TARGET_NAMESPACE"
